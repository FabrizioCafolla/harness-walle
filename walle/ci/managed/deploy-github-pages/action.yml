name: Deploy to GitHub Pages
description: |
  This workflow deploys your Astro site to GitHub Pages.
  It builds the site and then deploys it to the `gh-pages` branch.

inputs:
  token:
    description: "GitHub token for authentication (usually `secrets.GITHUB_TOKEN`)"
    required: true
  publish_dir:
    description: "Directory to publish"
    required: true
    default: "./dist"
  cname:
    description: "Custom domain for GitHub Pages"
    required: false
    default: ""
  working_dir:
    description: "Website working dir"
    required: false
    default: "."

runs:
  using: "composite"
  steps:
    - name: Checkout your repository using git
      uses: actions/checkout@v7
    # Must run before setup-node's cache: yarn — see comment in website-tests/action.yml.
    - name: Enable Corepack
      shell: bash
      run: corepack enable
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: ${{ inputs.working_dir }}/.nvmrc
        cache: yarn
        cache-dependency-path: ${{ inputs.working_dir }}
    - name: Install & Build
      shell: bash
      working-directory: ${{ inputs.working_dir }}
      run: |
        corepack prepare --activate
        yarn install --immutable
        yarn build
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ inputs.token }}
        publish_dir: ${{ inputs.working_dir }}/${{ inputs.publish_dir }}
        cname: ${{ inputs.cname }}
