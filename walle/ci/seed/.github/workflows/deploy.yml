# Consumer-owned CI workflow (walle SEED): created once, never overwritten by `walle update`.
# Edit freely. The reusable deploy logic lives in the walle-managed composite action below.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Deploy to GitHub Pages
        uses: ./.github/workflows/actions/@walle/deploy-github-pages
        timeout-minutes: 5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
